general {
    grace = 1
}

background {
    path = ~/dotfiles/backgrounds/mountains-purple.jpg
    blur_size = 12
    blur_passes = 2
    noise = 0.015
    contrast = 1.35
    brightness = 0.55
    vibrancy = 0.25
}

input-field {
    size = 260, 50
    dots_size = 0.32
    dots_spacing = 0.25

    outer_color = #89b4fa
    inner_color = #1e1e2e
    font_color = #cdd6f4

    position = 0, 180
    halign = center
    valign = bottom
    fade_on_empty = false
}

label {
    text = cmd[update:1000] echo "$(date +"%I:%M:%S %p")"
    font_size = 75
    font_family = "JetBrains Mono"
    halign = center
    valign = center
}

image {
    monitor =
    path = ~/dotfiles/backgrounds/neon_orb.jpg
    size = 250
    border_size = 3
    border_color = #a6e3a1
    rotate = 0
    reload_time = -1
    position = 0, 250
    halign = center
    valign = bottom
}
