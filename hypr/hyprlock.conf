general {
    grace = 1
}

input-field {
    size = 260, 50
    dots_size = 0.32
    dots_spacing = 0.25

    outer_color = #89b4fa
    inner_color = #1e1e2e
    font_color = #cdd6f4

    position = 0, 180
    halign = center
    valign = bottom
    fade_on_empty = false
}

label {
    text = cmd[update:1000] echo "$(date +"%I:%M:%S %p")"
    font_size = 75
    font_family = "JetBrains Mono"
    halign = center
    valign = center
}
